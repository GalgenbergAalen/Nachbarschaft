<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Infos | Nachbarschaft Galgenberg</title>
  <link rel="canonical" href="https://galgenbergaalen.github.io/Nachbarschaft/infos.html">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>ℹ️ Infos</h1>
    <p>Hinweise und Entwicklungen rund um den Galgenberg</p>

    <nav class="header-nav" aria-label="Hauptnavigation">
      <ul class="header-button-list">
        <li><a href="index.html" class="header-link-button">🏠 Start</a></li>
        <li><a href="events.html" class="header-link-button">📅 Termine</a></li>
        <li><a href="austausch.html" class="header-link-button">💬 Austausch</a></li>
        <li><a href="infos.html" class="header-link-button">ℹ️ Infos</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="box">
      <h2>Aktuelle Infos aus dem Viertel</h2>
      <p>
        Hier findest du wichtige Informationen und Entwicklungen auf und rund um den Galgenberg
        für alle Anwohnerinnen und Anwohner.
      </p>

      <img src="event2.png" alt="Plakat oder Hinweis zur Veranstaltung" class="content-image">
    </div>

    <div id="infoGroups"></div>

    <div class="box">
      <a href="index.html" class="back-link">← Zurück zur Startseite</a>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="infos-data.js"></script>
  <script src="contact.js"></script>
  <script src="footer-include.js"></script>

  <script>
    function formatDate(dateString) {
      const date = new Date(`${dateString}T00:00:00`);
      return date.toLocaleDateString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      });
    }

    function renderInfoGroups() {
      const container = document.getElementById("infoGroups");

      if (typeof infos === "undefined" || infos.length === 0) {
        container.innerHTML = `
          <div class="box">
            <h2>Aktuell keine Einträge</h2>
            <p>Zurzeit sind noch keine weiteren Infos hinterlegt.</p>
          </div>
        `;
        return;
      }

      const combinedCategories = [
        "Aktuelle Infos aus dem Viertel",
        "Laufende und anstehende Bauprojekte",
        "Eröffnungen"
      ];

      const combinedInfos = infos
        .filter((info) => combinedCategories.includes(info.category))
        .sort((a, b) => {
          if (a.date === b.date) {
            return a.title.localeCompare(b.title);
          }

          return b.date.localeCompare(a.date);
        });

      if (combinedInfos.length === 0) {
        container.innerHTML = `
          <div class="box">
            <h2>Aktuell keine Einträge</h2>
            <p>Zurzeit sind noch keine weiteren Infos hinterlegt.</p>
          </div>
        `;
        return;
      }

      const itemsHtml = combinedInfos.map((info) => `
        <li class="info-item">
          <p class="info-item-date">${formatDate(info.date)}</p>
          <p class="info-category">${info.category}</p>
          <h3>${info.title}</h3>
          <p class="info-item-meta"><strong>Ort:</strong> ${info.location}</p>
          <p>${info.shortText}</p>
          <a
            class="info-item-link"
            href="${info.link}"
            target="_blank"
            rel="noopener noreferrer"
          >
            Zum Artikel
          </a>
        </li>
      `).join("");

      container.innerHTML = `
        <div class="box">
          <h2>Aktuelle Infos aus dem Viertel</h2>
          <ul class="info-list">
            ${itemsHtml}
          </ul>
        </div>
      `;
    }

    renderInfoGroups();
  </script>

  <script
    data-goatcounter="https://galgenbergaalen.goatcounter.com/count"
    async
    src="//gc.zgo.at/count.js"
  ></script>
</body>
</html>
