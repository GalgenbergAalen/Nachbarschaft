<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Events</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Events 📅</h1>
  </header>

  <main>
    <div class="box">

      <div class="events-controls">
        <div class="filter-bar">
          <button class="filter-button active" onclick="filterEvents('upcoming', this)">Kommende</button>
          <button class="filter-button" onclick="filterEvents('past', this)">Vergangene</button>
          <button class="filter-button" onclick="filterEvents('all', this)">Alle</button>
        </div>
      </div>

      <ul id="eventList">
        <li class="event-item" data-date="2026-04-17" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 17. April - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>

        <li class="event-item" data-date="2026-05-08" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 08. Mai - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>

        <li class="event-item" data-date="2026-06-12" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 12. Juni - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>

        <li class="event-item" data-date="2026-07-10" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 10. Juli - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>

        <li class="event-item" data-date="2026-08-14" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 14. August - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>

        <li class="event-item" data-date="2026-09-18" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 18. September - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>

        <li class="event-item" data-date="2026-10-09" data-image="Event2.png" data-contact="Renate, Angela, Thomas, Johannes">
          <button type="button" class="event-link" onclick="showEvent(this)">Freitag, 09. Oktober - 19 Uhr - Auf ein Bier mit dem Galgenberg</button>
        </li>
      </ul>

      <p id="noResults">Für diesen Filter gibt es aktuell keine Termine.</p>

      <div class="event-details">
        <h2 id="selectedEvent"></h2>
        <img id="eventImage" src="" alt="Eventbild">
        <p id="eventContact"></p>
      </div>

      <a class="back-link" href="index.html">Zurück zur Startseite</a>

    </div>
  </main>

  <footer>
    <p>Nachbarschaftsseite · privat organisiert</p>
    <p>
      <a href="impressum.html">Impressum</a> |
      <a href="datenschutz.html">Datenschutz</a>
    </p>
  </footer>

  <script>
    function showEvent(el) {
      document.querySelectorAll(".event-link").forEach(e => e.classList.remove("active"));
      el.classList.add("active");

      const item = el.closest(".event-item");
      const title = document.getElementById("selectedEvent");
      const image = document.getElementById("eventImage");
      const contact = document.getElementById("eventContact");

      const imagePath = item.dataset.image;
      const contactText = item.dataset.contact;

      title.textContent = el.textContent;
      title.style.display = "block";

      if (contactText) {
        contact.textContent = "Ansprechpartner: " + contactText;
        contact.style.display = "block";
      } else {
        contact.style.display = "none";
      }

      image.classList.remove("visible");

      if (imagePath) {
        image.src = imagePath;
        image.style.display = "block";

        setTimeout(() => {
          title.scrollIntoView({ behavior: "smooth", block: "start" });
          image.classList.add("visible");
        }, 100);
      } else {
        image.removeAttribute("src");
        image.style.display = "none";

        setTimeout(() => {
          title.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 100);
      }
    }

    function filterEvents(type, btn) {
      document.querySelectorAll(".filter-button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let visibleCount = 0;

      document.querySelectorAll(".event-item").forEach(item => {
        const d = new Date(item.dataset.date);
        d.setHours(0, 0, 0, 0);

        let show = false;

        if (type === "all") show = true;
        if (type === "upcoming") show = d >= today;
        if (type === "past") show = d < today;

        item.classList.toggle("hidden", !show);

        if (show) visibleCount++;
      });

      document.getElementById("noResults").style.display = visibleCount === 0 ? "block" : "none";
    }

    function markSpecialEvents() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const items = document.querySelectorAll(".event-item");
      let nextItem = null;
      let nextDate = null;
      let todayFound = false;

      items.forEach(item => {
        const link = item.querySelector(".event-link");
        link.classList.remove("today-event", "next-event");

        const d = new Date(item.dataset.date);
        d.setHours(0, 0, 0, 0);

        if (d.getTime() === today.getTime()) {
          link.classList.add("today-event");
          todayFound = true;
        }
      });

      if (!todayFound) {
        items.forEach(item => {
          const d = new Date(item.dataset.date);
          d.setHours(0, 0, 0, 0);

          if (d >= today && (!nextDate || d < nextDate)) {
            nextDate = d;
            nextItem = item;
          }
        });

        if (nextItem) {
          nextItem.querySelector(".event-link").classList.add("next-event");
        }
      }
    }

    markSpecialEvents();
    filterEvents("upcoming", document.querySelector(".filter-button.active"));
  </script>

</body>
</html>
